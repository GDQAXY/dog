<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>会员中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .container {
            max-width: 414px;
            margin: 0 auto;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 16px 100px;
            color: white;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-right: 40px;
        }

        /* 会员卡片 */
        .vip-card {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            margin: -80px 16px 16px;
            border-radius: 20px;
            padding: 24px;
            color: #333;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }

        .vip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .vip-level {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vip-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .vip-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .vip-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .vip-btn {
            padding: 8px 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 成长值 */
        .growth-section {
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px;
        }

        .growth-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .growth-label {
            font-size: 13px;
        }

        .growth-value {
            font-size: 13px;
            font-weight: 600;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 65%;
            background: white;
            border-radius: 4px;
        }

        .growth-tip {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.9;
        }

        /* 会员权益 */
        .benefits-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .benefit-name {
            font-size: 12px;
            color: #333;
        }

        /* 会员等级 */
        .levels-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .level-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .level-item.current {
            background: linear-gradient(135deg, #fff9e6, #fff3cd);
            border: 2px solid #ffd700;
        }

        .level-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }

        .level-info {
            flex: 1;
        }

        .level-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .level-desc {
            font-size: 12px;
            color: #999;
        }

        .level-status {
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
        }

        /* 积分加速 */
        .points-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .points-multiplier {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            color: white;
        }

        .multiplier-item {
            text-align: center;
        }

        .multiplier-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .multiplier-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .multiplier-divider {
            width: 1px;
            height: 40px;
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <div class="back-btn" onclick="history.back()">←</div>
                <div class="header-title">会员中心</div>
            </div>
        </div>

        <!-- 会员卡片 -->
        <div class="vip-card">
            <div class="vip-header">
                <div class="vip-level">
                    <div class="vip-icon">👑</div>
                    <div class="vip-info">
                        <h3>黄金会员</h3>
                        <p>有效期至 2026-12-31</p>
                    </div>
                </div>
                <div class="vip-btn">立即续费</div>
            </div>
            <div class="growth-section">
                <div class="growth-header">
                    <span class="growth-label">当前成长值</span>
                    <span class="growth-value">6,580 / 10,000</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="growth-tip">再消费 ¥3,420 即可升级白金会员</div>
            </div>
        </div>

        <!-- 会员权益 -->
        <div class="benefits-section">
            <div class="section-title">🎁 会员权益</div>
            <div class="benefits-grid">
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #e8f5e9; font-size: 24px;">🎫</div>
                    <div class="benefit-name">每月券包</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #fff3e0; font-size: 24px;">💰</div>
                    <div class="benefit-name">专属折扣</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #e3f2fd; font-size: 24px;">🚀</div>
                    <div class="benefit-name">积分加速</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #fce4ec; font-size: 24px;">🎂</div>
                    <div class="benefit-name">生日特权</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #f3e5f5; font-size: 24px;">👨‍⚕️</div>
                    <div class="benefit-name">免费问诊</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #e0f7fa; font-size: 24px;">🏨</div>
                    <div class="benefit-name">优先预订</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #fff9e6; font-size: 24px;">🚚</div>
                    <div class="benefit-name">包邮特权</div>
                </div>
                <div class="benefit-item">
                    <div class="benefit-icon" style="background: #ffebee; font-size: 24px;">💎</div>
                    <div class="benefit-name">专属客服</div>
                </div>
            </div>
        </div>

        <!-- 积分加速 -->
        <div class="points-section">
            <div class="section-title">⭐ 积分特权</div>
            <div class="points-multiplier">
                <div class="multiplier-item">
                    <div class="multiplier-value">1.5x</div>
                    <div class="multiplier-label">购物积分</div>
                </div>
                <div class="multiplier-divider"></div>
                <div class="multiplier-item">
                    <div class="multiplier-value">2x</div>
                    <div class="multiplier-label">任务积分</div>
                </div>
                <div class="multiplier-divider"></div>
                <div class="multiplier-item">
                    <div class="multiplier-value">+500</div>
                    <div class="multiplier-label">月签到奖</div>
                </div>
            </div>
        </div>

        <!-- 会员等级 -->
        <div class="levels-section">
            <div class="section-title">🏆 会员等级</div>
            <div class="level-list">
                <div class="level-item current">
                    <div class="level-badge" style="background: linear-gradient(135deg, #ffd700, #ffaa00);">🥇</div>
                    <div class="level-info">
                        <div class="level-name">黄金会员</div>
                        <div class="level-desc">成长值 5,000 - 10,000</div>
                    </div>
                    <div class="level-status">当前等级</div>
                </div>
                <div class="level-item">
                    <div class="level-badge" style="background: #e0e0e0;">🥈</div>
                    <div class="level-info">
                        <div class="level-name">白金会员</div>
                        <div class="level-desc">成长值 10,000 - 50,000</div>
                    </div>
                    <div class="level-status">还差 3,420</div>
                </div>
                <div class="level-item">
                    <div class="level-badge" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">💎</div>
                    <div class="level-info">
                        <div class="level-name">钻石会员</div>
                        <div class="level-desc">成长值 50,000+</div>
                    </div>
                    <div class="level-status">最高等级</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

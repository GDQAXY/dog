<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>意见反馈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .container {
            max-width: 414px;
            margin: 0 auto;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            background: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-left: -8px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-action {
            font-size: 15px;
            color: #667eea;
            padding: 8px;
            cursor: pointer;
        }

        /* 反馈类型 */
        .type-section {
            background: white;
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .type-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .type-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
        }

        /* 反馈内容 */
        .content-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .content-input {
            width: 100%;
            min-height: 150px;
            border: none;
            outline: none;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
        }

        .content-input::placeholder {
            color: #999;
        }

        .content-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* 图片上传 */
        .image-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .image-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .image-item {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            position: relative;
        }

        .image-item.add {
            border: 2px dashed #ddd;
            color: #999;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .image-delete {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .image-tip {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
        }

        /* 联系方式 */
        .contact-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .contact-input {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-input span {
            font-size: 15px;
            color: #333;
        }

        .contact-input input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            padding: 8px 0;
        }

        /* 提交按钮 */
        .submit-section {
            padding: 20px 16px 40px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:disabled {
            background: #ccc;
        }

        /* 历史反馈 */
        .history-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 20px;
        }

        .history-item {
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-type {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .history-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 10px;
        }

        .history-status.pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .history-status.replied {
            background: #e8f5e9;
            color: #4caf50;
        }

        .history-content {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-time {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="back-btn" onclick="history.back()">←</div>
            <div class="header-title">意见反馈</div>
            <div class="header-action" onclick="alert('提交反馈')">提交</div>
        </div>

        <!-- 反馈类型 -->
        <div class="type-section">
            <div class="section-title">反馈类型</div>
            <div class="type-grid">
                <div class="type-item active" onclick="selectType(this)">功能建议</div>
                <div class="type-item" onclick="selectType(this)">问题反馈</div>
                <div class="type-item" onclick="selectType(this)">服务投诉</div>
                <div class="type-item" onclick="selectType(this)">账号问题</div>
                <div class="type-item" onclick="selectType(this)">订单问题</div>
                <div class="type-item" onclick="selectType(this)">其他</div>
            </div>
        </div>

        <!-- 反馈内容 -->
        <div class="content-section">
            <div class="section-title">反馈内容</div>
            <textarea class="content-input" placeholder="请详细描述您的问题或建议，我们会认真听取您的意见..."></textarea>
            <div class="content-count">0/500</div>
        </div>

        <!-- 图片上传 -->
        <div class="image-section">
            <div class="section-title">添加图片（选填）</div>
            <div class="image-grid">
                <div class="image-item add" onclick="alert('选择图片')">+</div>
            </div>
            <div class="image-tip">最多上传5张图片，每张不超过10MB</div>
        </div>

        <!-- 联系方式 -->
        <div class="contact-section">
            <div class="section-title">联系方式（选填）</div>
            <div class="contact-input">
                <span>📱</span>
                <input type="text" placeholder="手机号/邮箱，方便我们回复您">
            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="submit-section">
            <button class="submit-btn" onclick="alert('提交反馈')">提交反馈</button>
        </div>

        <!-- 历史反馈 -->
        <div class="history-section">
            <div class="section-title">历史反馈</div>
            <div class="history-item">
                <div class="history-header">
                    <span class="history-type">功能建议</span>
                    <span class="history-status replied">已回复</span>
                </div>
                <div class="history-content">建议增加宠物寄养的日历视图，方便查看哪些日期可以预约。</div>
                <div class="history-time">2026-03-15 14:30</div>
            </div>
            <div class="history-item">
                <div class="history-header">
                    <span class="history-type">问题反馈</span>
                    <span class="history-status pending">处理中</span>
                </div>
                <div class="history-content">APP偶尔会出现闪退问题，希望尽快修复。</div>
                <div class="history-time">2026-03-20 09:15</div>
            </div>
        </div>
    </div>

    <script>
        // 选择反馈类型
        function selectType(element) {
            document.querySelectorAll('.type-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        // 字数统计
        document.querySelector('.content-input').addEventListener('input', function() {
            const count = this.value.length;
            document.querySelector('.content-count').textContent = count + '/500';
        });
    </script>
</body>
</html>
